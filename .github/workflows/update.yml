name: Update ETF Data

on:
  schedule:
    # 台灣時間週一至五 09:00 - 14:00 (UTC 01:00 - 06:00)
    - cron: '*/30 1-6 * * 1-5'
  workflow_dispatch: # 允許你手動點擊按鈕執行

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          pip install requests beautifulsoup4 pandas lxml

      - name: Run Crawler
        run: python main.py  # 確保你的爬蟲腳本檔名是 main.py

      - name: Commit and Push
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          git add etf_data.json
          # 如果資料沒變，git commit 會失敗，這裡用 || exit 0 忽略錯誤
          git commit -m "Auto-update ETF data: $(date)" || exit 0
          git push
