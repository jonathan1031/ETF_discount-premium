name: Update ETF Data

on:
  schedule:
    # 台灣時間週一至五 09:00 - 14:00 (UTC 01:00 - 06:00)
    - cron: '*/30 1-6 * * 1-5'
  workflow_dispatch: # 允許你手動點擊按鈕執行

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          pip install requests beautifulsoup4 pandas lxml

      - name: Run Crawler
        run: python main.py  # 確保你的爬蟲腳本檔名是 main.py

      - name: Commit and Push
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          
          # 檢查檔案是否存在，如果不存在就印出錯誤並停止
          if [ ! -f etf_data.json ]; then
            echo "錯誤：etf_data.json 並未產生！請檢查爬蟲步驟。"
            exit 1
          fi
          
          git add etf_data.json
          # 如果檔案沒有變動，git commit 會回傳 1，我們用 || echo 忽略它
          git commit -m "Auto-update ETF data: $(date)" || echo "No changes to commit"
          git push
